<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稟軒會考衝刺首頁 - SAI 應試覺醒 V14.60</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap');
        
        body { margin: 0; padding: 0; overflow-x: hidden; font-family: 'Noto Sans TC', sans-serif; background: #FDFBF7; scroll-behavior: smooth; }
        .vibrant-bg { background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); position: relative; min-height: 100vh; }
        .go-board-overlay { position: fixed; inset: 0; background-image: linear-gradient(#8b4513 0.5px, transparent 0.5px), linear-gradient(90deg, #8b4513 0.5px, transparent 0.5px); background-size: 40px 40px; opacity: 0.1; pointer-events: none; z-index: 0; }
        
        .glass-card { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        
        .tag-國文 { background: #ef4444; color: white; }
        .tag-英文 { background: #3b82f6; color: white; }
        .tag-數學 { background: #f59e0b; color: white; }
        .tag-自然 { background: #10b981; color: white; }
        .tag-社會 { background: #8b5cf6; color: white; }
        .tag-其他 { background: #6b7280; color: white; }

        .spinner { width: 40px; height: 40px; border: 4px solid #4b0082; border-top: 4px solid #ffd700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-spinner { animation: spin 1s linear infinite; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .select-clean { -webkit-appearance: none; -moz-appearance: none; appearance: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }
        
        @keyframes fast-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(1800deg); } }
        .animate-fast-spin { animation: fast-spin 2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes shake-tube { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        .animate-shake-tube { animation: shake-tube 0.3s ease-in-out infinite; }
        
        .mom-quote-card {
            background: linear-gradient(135deg, #ffffff 0%, #fef2f2 100%);
            border-left: 6px solid #fb7185;
            transition: all 0.3s ease;
        }
        .mom-quote-card:active { transform: scale(0.98); }
        .fade-message { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .modal-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* 淨化掃描效果 */
        .cleaning-scan {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fbbf24;
            box-shadow: 0 0 15px #fbbf24;
            animation: scanning 2s linear infinite;
        }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="vibrant-bg">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const myFirebaseConfig = {
            apiKey: "AIzaSyAo6qGtng1z3SAn86wMrtFKLkVmPPCEVSU",
            authDomain: "exam-8ae8d.firebaseapp.com",
            projectId: "exam-8ae8d",
            storageBucket: "exam-8ae8d.firebasestorage.app",
            messagingSenderId: "988791791039",
            appId: "1:988791791039:web:acd9437a7b4a546bafd50a",
            measurementId: "G-TD30PX25GY"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getFirestore, initializeFirestore, persistentLocalCache, persistentSingleTabManager, 
            collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, serverTimestamp, setDoc, getDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const app = initializeApp(myFirebaseConfig);
        const auth = getAuth(app);
        
        let db;
        try {
            db = initializeFirestore(app, {
                localCache: persistentLocalCache({tabManager: persistentSingleTabManager()})
            });
        } catch (e) {
            db = getFirestore(app);
        }

        const appId = "exam-8ae8d";
        const apiKey = ""; 

        const SUBJECTS = ["國文", "英文", "數學", "自然", "社會", "其他"];
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, className]);
            return (
                <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const TimeUnit = ({ label, value }) => (
            <div className="flex-1">
                <div className="bg-stone-800 rounded sm:rounded-xl border border-amber-500/80 shadow-lg px-1.5 py-1 sm:px-2.5 sm:py-2 flex items-baseline justify-center gap-0.5 sm:gap-1">
                    <span className="text-lg sm:text-4xl font-black tabular-nums text-amber-400 leading-none">
                        {String(value).padStart(2, '0')}
                    </span>
                    <span className="text-[9px] sm:text-sm font-black text-amber-200/40 uppercase tracking-tighter">{label}</span>
                </div>
            </div>
        );

        const LazyImage = ({ src, className }) => {
            const [isVisible, setIsVisible] = useState(false);
            const imgRef = useRef();
            useEffect(() => {
                const observer = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setIsVisible(true); observer.disconnect(); } });
                if (imgRef.current) observer.observe(imgRef.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div ref={imgRef} className={`bg-stone-100 flex items-center justify-center relative overflow-hidden ${className}`}>
                    {isVisible ? <img src={src} className="w-full h-full object-cover object-top animate-in fade-in duration-500" loading="lazy" decoding="async" /> : <Icon name="image" size={24} className="text-stone-300 opacity-50" />}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ coins: 0, gameChances: 0, correctCount: 0 });
            const [tasks, setTasks] = useState([]); 
            const [isLoading, setIsLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [historyDisplayLimit, setHistoryDisplayLimit] = useState(20); 
            const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });
            const [viewMode, setViewMode] = useState("active"); 
            const [inputMode, setInputMode] = useState("photo"); 
            const [selectedSubject, setSelectedSubject] = useState("全部");
            const [aiMessage, setAiMessage] = useState(null);
            const [activeExamTask, setActiveExamTask] = useState(null); 
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [isDeleting, setIsDeleting] = useState(false);
            const [isPreCompressing, setIsPreCompressing] = useState(false); 
            
            // 淨化與裁切 State
            const [cleaningImage, setCleaningImage] = useState(null);
            const [processedCleaningUrl, setProcessedCleaningUrl] = useState(null);
            const [isProcessingClean, setIsProcessingClean] = useState(false);
            const [cleanSettings, setCleanSettings] = useState({ red: false, blue: false, pencil: false });
            
            const [croppingImage, setCroppingImage] = useState(null); 
            const [isProcessingCrop, setIsProcessingCrop] = useState(false); 
            const cropperRef = useRef(null);
            const cropperImgRef = useRef(null);
            const [showWebcam, setShowWebcam] = useState(false);
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const [shakingItems, setShakingItems] = useState([]);

            const [momMessage, setMomMessage] = useState("稟軒，這一步是通往夢想的神之一手。加油！");
            const [isMessageLoading, setIsMessageLoading] = useState(false);
            const [showGameCenter, setShowGameCenter] = useState(false);
            const [playingGame, setPlayingGame] = useState(null); 
            const [gameResult, setGameResult] = useState(null);

            const getLocalDateString = () => {
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                return (new Date(now - offset)).toISOString().split('T')[0];
            };

            const [newTask, setNewTask] = useState("");
            const [newDate, setNewDate] = useState(getLocalDateString());
            const [newCategory, setNewCategory] = useState("國文");
            const [previewList, setPreviewList] = useState([]); 
            const fileInputRef = useRef(null);

            const targetDate = useMemo(() => new Date('2026-05-16T00:00:00'), []);
            const todayStr = useMemo(() => getLocalDateString(), []);

            // Firebase Auth
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Profile Listen
            useEffect(() => {
                if (!user) return;
                const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', 'GLOBAL_PROFILE');
                const unsubProfile = onSnapshot(profileRef, (docSnap) => {
                    if (docSnap.exists()) setProfile(docSnap.data());
                    else {
                        const initialData = { type: 'profile', coins: 0, gameChances: 0, correctCount: 0, createdAt: serverTimestamp() };
                        setDoc(profileRef, initialData); setProfile(initialData);
                    }
                });
                return () => unsubProfile();
            }, [user]);

            useEffect(() => { fetchMomMessage(); }, [viewMode]);

            // Tasks Listen
            useEffect(() => {
                if (!user) return;
                const activeQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), where('completed', '==', false));
                const unsubActive = onSnapshot(activeQ, (snap) => {
                    const activeTasks = snap.docs.filter(doc => doc.id !== 'GLOBAL_PROFILE').map(doc => ({ id: doc.id, ...doc.data() }));
                    setTasks(prev => [...activeTasks, ...prev.filter(t => t.completed)]);
                    setIsLoading(false);
                });
                const timer = setTimeout(() => {
                    const historyQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), where('completed', '==', true));
                    onSnapshot(historyQ, (snap) => {
                        const historyTasks = snap.docs.filter(doc => doc.id !== 'GLOBAL_PROFILE').map(doc => ({ id: doc.id, ...doc.data() }));
                        setTasks(prev => [...prev.filter(t => !t.completed), ...historyTasks]);
                    });
                }, 1500);
                return () => { unsubActive(); clearTimeout(timer); };
            }, [user]);

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = targetDate - new Date();
                    if (diff <= 0) setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
                    else setTimeLeft({ d: Math.floor(diff / 86400000), h: Math.floor((diff / 3600000) % 24), m: Math.floor((diff / 60000) % 60), s: Math.floor((diff / 1000) % 60) });
                }, 1000);
                return () => clearInterval(timer);
            }, [targetDate]);

            // 影像處理邏輯：消除筆跡
            const processHandwritingRemoval = useCallback((source, settings) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                        if (!settings.red && !settings.blue && !settings.pencil) { resolve(source); return; }
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2];
                            let clean = false;
                            if (settings.red && r > 130 && r > g * 1.3 && r > b * 1.3) clean = true;
                            if (settings.blue && b > 120 && b > r * 1.1 && b > g * 1.1) clean = true;
                            if (settings.pencil && r < 140 && g < 140 && b < 140 && Math.abs(r-g) < 25 && Math.abs(g-b) < 25) clean = true;
                            if (clean) { data[i] = 255; data[i+1] = 255; data[i+2] = 255; }
                        }
                        ctx.putImageData(imgData, 0, 0); resolve(canvas.toDataURL('image/jpeg', 0.9));
                    };
                    img.src = source;
                });
            }, []);

            // 監聽淨化設定
            useEffect(() => {
                if (cleaningImage) {
                    setIsProcessingClean(true);
                    const timer = setTimeout(async () => {
                        const result = await processHandwritingRemoval(cleaningImage, cleanSettings);
                        setProcessedCleaningUrl(result); setIsProcessingClean(false);
                    }, 400);
                    return () => clearTimeout(timer);
                }
            }, [cleanSettings, cleaningImage, processHandwritingRemoval]);

            const preCompress = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX = 1600; let w = img.width, h = img.height;
                            if (w > MAX) { h = Math.round((h * MAX) / w); w = MAX; }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.9));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileSelect = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsPreCompressing(true);
                const safeUrl = await preCompress(file);
                setCleaningImage(safeUrl); setCleanSettings({ red: false, blue: false, pencil: false });
                setIsPreCompressing(false); e.target.value = "";
            };

            const startWebcam = async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = s; setShowWebcam(true);
                    setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = s; }, 100);
                } catch (e) { alert("相機開啟失敗"); }
            };

            const capturePhoto = () => {
                const v = videoRef.current;
                const canvas = document.createElement('canvas');
                canvas.width = v.videoWidth > 1600 ? 1600 : v.videoWidth;
                canvas.height = (canvas.width * v.videoHeight) / v.videoWidth;
                canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
                const url = canvas.toDataURL('image/jpeg', 0.9);
                if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                setShowWebcam(false); setCleaningImage(url); setCleanSettings({ red: false, blue: false, pencil: false });
            };

            const fetchMomMessage = async (retry = 0) => {
                if (isMessageLoading) return; setIsMessageLoading(true);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "你是稟軒的媽媽，生成一句溫馨勵志的圍棋精神鼓勵話語(15-25字)" }] }] })
                    });
                    const data = await res.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) setMomMessage(text.trim());
                } catch (e) { if (retry < 3) setTimeout(() => fetchMomMessage(retry+1), 1000); }
                finally { setIsMessageLoading(false); }
            };

            const incrementGameChance = async () => {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', 'GLOBAL_PROFILE');
                const snap = await getDoc(ref);
                if (!snap.exists()) return;
                const data = snap.data();
                const newCorrect = (data.correctCount || 0) + 1;
                if (newCorrect >= 3) {
                    await setDoc(ref, { gameChances: (data.gameChances || 0) + 1, correctCount: 0 }, { merge: true });
                    setAiMessage({ text: "🎉 集滿 3 題，獲得 1 張遊戲券！", status: 'correct' });
                } else {
                    await setDoc(ref, { correctCount: newCorrect }, { merge: true });
                    setAiMessage({ text: `獲得 1 點！(進度: ${newCorrect}/3)`, status: 'correct' });
                }
                setTimeout(() => setAiMessage(null), 2500);
            };

            const sortedTasks = useMemo(() => [...tasks].sort((a,b) => (a.date||"").localeCompare(b.date||"")), [tasks]);
            const listToDisplay = useMemo(() => {
                let f = sortedTasks;
                if (selectedSubject !== "全部") f = f.filter(t => t.category === selectedSubject);
                if (viewMode === 'active') return f.filter(t => !t.completed && (t.date || "9999") <= todayStr);
                if (viewMode === 'future') return f.filter(t => (t.date || "9999") > todayStr);
                return f.filter(t => t.completed).reverse().slice(0, historyDisplayLimit);
            }, [sortedTasks, viewMode, todayStr, historyDisplayLimit, selectedSubject]);

            const counts = useMemo(() => {
                let f = sortedTasks;
                if (selectedSubject !== "全部") f = f.filter(t => t.category === selectedSubject);
                return {
                    active: f.filter(t => !t.completed && (t.date || "9999") <= todayStr).length,
                    future: f.filter(t => (t.date || "9999") > todayStr).length,
                    history: f.filter(t => t.completed).length
                };
            }, [sortedTasks, todayStr, selectedSubject]);

            const addTask = async (e) => {
                e.preventDefault();
                if (inputMode === 'photo' && previewList.length === 0) return;
                setIsSubmitting(true);
                try {
                    if (inputMode === 'photo') {
                        await Promise.all(previewList.map(item => addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), {
                            type: 'photo', imageUrl: item.dataUrl, correctAnswer: item.answer, category: newCategory, date: newDate, completed: false, createdAt: serverTimestamp(), attempts: 0
                        })));
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), {
                            type: 'text', content: newTask, category: newCategory, date: newDate, completed: false, createdAt: serverTimestamp(), attempts: 0
                        });
                    }
                    setPreviewList([]); setNewTask("");
                } finally { setIsSubmitting(false); }
            };

            const submitAnswer = async (task, ans) => {
                const correct = (task.correctAnswer || "").trim().toUpperCase();
                if (ans.toUpperCase() === correct) {
                    setAiMessage({ text: "妙手！", status: 'correct' });
                    setTimeout(async () => {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { completed: true, attempts: (task.attempts || 0) + 1, completedAt: serverTimestamp() });
                        setAiMessage(null); setActiveExamTask(null); incrementGameChance();
                    }, 800);
                } else {
                    setAiMessage({ text: "不通！", status: 'wrong' });
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id), { attempts: (task.attempts || 0) + 1 });
                    setTimeout(() => setAiMessage(null), 800);
                }
            };

            const executeGame = (type) => {
                if (profile.gameChances < 1) return;
                setPlayingGame(type); setGameResult(null);
                setTimeout(async () => {
                    const prize = Math.floor(Math.random() * 10) + 1;
                    setGameResult(prize);
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', 'GLOBAL_PROFILE');
                    await setDoc(ref, { gameChances: profile.gameChances - 1, coins: (profile.coins || 0) + prize }, { merge: true });
                }, type === 'scratch' ? 600 : 2000);
            };

            const subStyles = { "國文": "bg-rose-500", "英文": "bg-blue-500", "數學": "bg-amber-500", "自然": "bg-emerald-500", "社會": "bg-purple-500", "其他": "bg-teal-500" };

            return (
                <div className="min-h-screen relative pb-20 text-[#2D2D2D]">
                    <div className="go-board-overlay"></div>

                    {/* 淨化 Modal */}
                    {cleaningImage && (
                        <div className="fixed inset-0 z-[4000] modal-blur flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-stone-900 w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden border border-white/20 flex flex-col h-[80vh]">
                                <div className="p-4 border-b border-white/10 flex justify-between items-center bg-stone-800">
                                    <h3 className="text-white font-black flex items-center gap-2"><Icon name="wand-2" size={20} className="text-amber-400" /> 棋局淨化</h3>
                                    <button onClick={() => setCleaningImage(null)} className="text-white/50 hover:text-white bg-white/10 p-1 rounded-full"><Icon name="x" size={18} /></button>
                                </div>
                                <div className="flex-1 bg-black relative flex items-center justify-center overflow-hidden">
                                    <img src={processedCleaningUrl || cleaningImage} className={`max-w-full max-h-full object-contain ${isProcessingClean ? 'opacity-50' : ''}`} />
                                    {isProcessingClean && <div className="cleaning-scan"></div>}
                                </div>
                                <div className="p-4 sm:p-6 bg-stone-800 space-y-4">
                                    <div className="grid grid-cols-3 gap-2">
                                        {[
                                            { id: 'red', label: '消紅筆', color: 'bg-red-500' },
                                            { id: 'blue', label: '消藍筆', color: 'bg-blue-500' },
                                            { id: 'pencil', label: '消鉛筆', color: 'bg-stone-500' }
                                        ].map(o => (
                                            <button key={o.id} onClick={() => setCleanSettings(s => ({ ...s, [o.id]: !s[o.id] }))} className={`py-3 rounded-2xl flex flex-col items-center gap-1 border-2 transition-all ${cleanSettings[o.id] ? 'bg-white border-white text-black' : 'bg-stone-700 border-white/10 text-white opacity-60'}`}>
                                                <div className={`w-6 h-6 rounded-full ${o.color}`}></div>
                                                <span className="text-[10px] font-black">{o.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={() => { setCroppingImage(processedCleaningUrl || cleaningImage); setCleaningImage(null); }} className="w-full py-4 bg-amber-500 text-stone-900 font-black rounded-2xl shadow-lg active:scale-95 flex items-center justify-center gap-2">進入裁切 <Icon name="arrow-right" size={18} /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 裁切 Modal */}
                    {croppingImage && (
                        <div className="fixed inset-0 z-[5000] modal-blur flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-stone-900 w-full max-w-2xl h-[85vh] rounded-3xl shadow-2xl overflow-hidden border border-white/20 flex flex-col">
                                <div className="p-4 border-b border-white/10 bg-stone-800 flex justify-between items-center">
                                    <h3 className="text-white font-black">第二步：截取考題</h3>
                                    <button onClick={() => setCroppingImage(null)} className="text-white/50"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="flex-1 bg-black relative">
                                    <img ref={cropperImgRef} src={croppingImage} onLoad={() => { if(cropperRef.current) cropperRef.current.destroy(); cropperRef.current = new Cropper(cropperImgRef.current, { aspectRatio: NaN, viewMode: 1 }); }} className="hidden" />
                                </div>
                                <div className="p-4 bg-stone-800 flex gap-3">
                                    <button onClick={() => setCroppingImage(null)} className="flex-1 py-4 text-white/50 font-black">返回淨化</button>
                                    <button onClick={() => {
                                        const canvas = cropperRef.current.getCroppedCanvas({ maxWidth: 1600 });
                                        setPreviewList(p => [...p, { id: Math.random().toString(36).substr(2, 9), dataUrl: canvas.toDataURL('image/jpeg', 0.8), qType: 'choice', answer: null }]);
                                        setCroppingImage(null);
                                    }} className="flex-[2] py-4 bg-indigo-500 text-white font-black rounded-2xl shadow-lg active:scale-95">確認截圖</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 遊戲中心 Modal */}
                    {showGameCenter && (
                        <div className="fixed inset-0 z-[7000] flex items-center justify-center p-4 modal-blur animate-in fade-in">
                            <div className="bg-stone-900 w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-amber-500/30">
                                <div className="p-4 sm:p-6 bg-gradient-to-b from-stone-800 to-stone-900 border-b border-white/10 flex justify-between items-center relative">
                                    <h3 className="text-xl sm:text-2xl font-black text-amber-400 flex items-center gap-2"><Icon name="gamepad-2" size={28} /> 遊樂中心</h3>
                                    <button onClick={() => { setShowGameCenter(false); setPlayingGame(null); setGameResult(null); }} className="text-white/50 hover:text-white bg-white/5 p-2 rounded-full"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-4 sm:p-6 flex flex-col gap-6">
                                    <div className="flex justify-center items-center bg-stone-800 p-4 rounded-xl border border-stone-700">
                                        <div className="flex gap-8">
                                            <div className="flex flex-col items-center">
                                                <span className="text-[10px] text-amber-200/50 font-bold uppercase">持有金幣</span>
                                                <div className="flex items-center gap-1 text-amber-400 font-black text-2xl"><Icon name="coins" size={24} /> {profile.coins || 0}</div>
                                            </div>
                                            <div className="w-px bg-stone-700"></div>
                                            <div className="flex flex-col items-center">
                                                <span className="text-[10px] text-emerald-200/50 font-bold uppercase flex items-center gap-1">遊戲券</span>
                                                <div className="flex items-center gap-1 text-emerald-400 font-black text-2xl"><Icon name="ticket" size={24} /> {profile.gameChances || 0}</div>
                                            </div>
                                        </div>
                                    </div>
                                    {!playingGame ? (
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                            {['roulette', 'lots', 'scratch'].map(g => (
                                                <div key={g} onClick={() => executeGame(g)} className={`p-4 rounded-2xl flex flex-col items-center justify-center gap-2 border-2 transition-all ${profile.gameChances > 0 ? 'bg-indigo-900/40 border-indigo-500/50 hover:bg-indigo-800/60 cursor-pointer active:scale-95' : 'bg-stone-800/50 border-stone-700 opacity-50 cursor-not-allowed'}`}>
                                                    <div className="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-white"><Icon name={g === 'roulette' ? 'loader' : g === 'lots' ? 'scroll' : 'sparkles'} /></div>
                                                    <span className="text-white font-black text-sm">{g === 'roulette' ? '輪盤' : g === 'lots' ? '抽籤' : '刮刮樂'}</span>
                                                    <span className="text-[9px] text-white/40">消耗 1 券</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center py-8">
                                            {!gameResult ? (
                                                <div className="text-amber-500 font-black flex flex-col items-center animate-pulse"><Icon name="loader" size={48} className="animate-spin mb-4" />運算中...</div>
                                            ) : (
                                                <div className="text-center animate-in zoom-in">
                                                    <div className="text-6xl mb-4">🎉</div>
                                                    <h4 className="text-white font-black text-xl">獲得 {gameResult} 金幣</h4>
                                                    <button onClick={() => { setPlayingGame(null); setGameResult(null); }} className="mt-6 px-6 py-2 bg-white/10 text-white rounded-full font-bold">再來一次</button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 相機 */}
                    {showWebcam && (
                        <div className="fixed inset-0 z-[6000] bg-black/95 flex flex-col items-center justify-center p-4">
                            <video ref={videoRef} autoPlay playsInline className="w-full max-w-3xl rounded-3xl mb-6 bg-stone-900"></video>
                            <div className="flex gap-3 w-full max-w-md">
                                <button onClick={() => { if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); setShowWebcam(false); }} className="flex-1 py-4 bg-white/10 text-white rounded-2xl font-black">取消</button>
                                <button onClick={capturePhoto} className="flex-[2] py-4 bg-amber-500 text-stone-900 rounded-2xl font-black shadow-lg">立即拍攝</button>
                            </div>
                        </div>
                    )}

                    <header className="bg-stone-950 text-white py-8 px-4 text-center border-b-4 border-amber-500">
                        <div className="absolute top-4 right-4 text-[10px] font-black text-amber-200 tracking-widest opacity-40 uppercase">V14.60-SAI</div>
                        <div className="absolute top-4 left-4 flex gap-4 bg-stone-800/80 px-4 py-2 rounded-2xl border border-white/10 cursor-pointer" onClick={() => setShowGameCenter(true)}>
                            <div className="flex items-center gap-1 text-amber-400 font-black"><Icon name="coins" size={16} /> {profile.coins || 0}</div>
                            <div className="w-px h-4 bg-white/10"></div>
                            <div className="flex items-center gap-1 text-emerald-400 font-black"><Icon name="ticket" size={16} /> {profile.gameChances || 0}</div>
                        </div>
                        <div className="max-w-4xl mx-auto mt-6">
                            <div className="inline-flex items-center gap-2 px-6 py-2 rounded-full bg-amber-500 text-black font-black mb-6 shadow-lg"><Icon name="flame" /> <span>SAI ‧ 應試覺醒</span></div>
                            <h1 className="text-2xl sm:text-3xl font-black mb-6">稟軒，引導勝利的神之一手！</h1>
                            <div className="grid grid-cols-4 gap-1">
                                <TimeUnit label="天" value={timeLeft.d} />
                                <TimeUnit label="時" value={timeLeft.h} />
                                <TimeUnit label="分" value={timeLeft.m} />
                                <TimeUnit label="秒" value={timeLeft.s} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 grid lg:grid-cols-12 gap-8">
                        {/* 左側操作區 */}
                        <div className="lg:col-span-4 space-y-4">
                            <div className="mom-quote-card p-4 rounded-2xl shadow-sm cursor-pointer" onClick={() => fetchMomMessage()}>
                                <div className="flex items-center gap-2 mb-2 text-rose-600 font-black uppercase text-[10px] tracking-widest"><Icon name="heart" size={14} /> 媽媽的話</div>
                                <p className={`text-sm font-bold text-stone-700 leading-snug italic ${isMessageLoading ? 'opacity-30' : 'fade-message'}`}>「{momMessage}」</p>
                            </div>

                            <div className="glass-card p-6 rounded-3xl border border-stone-200 shadow-xl lg:sticky lg:top-8">
                                <h2 className="font-black text-lg mb-4 flex items-center gap-2 text-stone-800"><div className="w-3 h-3 rounded-full bg-black"></div> 佈局策略</h2>
                                <div className="flex bg-stone-100 p-1 rounded-2xl mb-4">
                                    <button onClick={() => setInputMode('photo')} className={`flex-1 py-2 text-xs font-black rounded-xl transition-all ${inputMode === 'photo' ? 'bg-white text-indigo-700 shadow-sm' : 'text-stone-400'}`}>拍照佈陣</button>
                                    <button onClick={() => setInputMode('text')} className={`flex-1 py-2 text-xs font-black rounded-xl transition-all ${inputMode === 'text' ? 'bg-white text-indigo-700 shadow-sm' : 'text-stone-400'}`}>文字任務</button>
                                </div>
                                <form onSubmit={addTask} className="space-y-4">
                                    <div className="flex flex-wrap gap-1">
                                        {SUBJECTS.map(s => (
                                            <button key={s} type="button" onClick={() => setNewCategory(s)} className={`px-3 py-1.5 rounded-xl text-[10px] font-black text-white ${newCategory === s ? subStyles[s] : 'bg-stone-200 text-stone-500'}`}>{s}</button>
                                        ))}
                                    </div>
                                    <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full p-3 rounded-xl border border-stone-200 bg-stone-50 font-bold" />
                                    {inputMode === 'photo' ? (
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-2 gap-3">
                                                <div onClick={() => !isPreCompressing && fileInputRef.current.click()} className="p-6 border-2 border-dashed border-stone-200 rounded-3xl flex flex-col items-center cursor-pointer hover:bg-stone-50">
                                                    <Icon name={isPreCompressing ? "loader-2" : "image"} className={isPreCompressing ? "animate-spin" : ""} />
                                                    <span className="text-[10px] font-black mt-2">選擇圖檔</span>
                                                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleFileSelect} />
                                                </div>
                                                <div onClick={startWebcam} className="p-6 border-2 border-dashed border-stone-200 rounded-3xl flex flex-col items-center cursor-pointer hover:bg-stone-50">
                                                    <Icon name="camera" />
                                                    <span className="text-[10px] font-black mt-2">相機拍攝</span>
                                                </div>
                                            </div>
                                            <div className="space-y-2 max-h-40 overflow-y-auto custom-scroll pr-1">
                                                {previewList.map(item => (
                                                    <div key={item.id} className="p-2 bg-stone-50 rounded-2xl flex gap-3 relative border border-stone-100">
                                                        <button type="button" onClick={() => setPreviewList(p => p.filter(i => i.id !== item.id))} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1"><Icon name="x" size={8} /></button>
                                                        <div className="w-12 h-12 rounded-lg overflow-hidden border bg-white"><img src={item.dataUrl} className="w-full h-full object-cover" /></div>
                                                        <div className="flex-1 grid grid-cols-4 gap-1">
                                                            {["A","B","C","D"].map(c => (
                                                                <button key={c} type="button" onClick={() => setPreviewList(p => p.map(i => i.id === item.id ? {...i, answer: c} : i))} className={`h-8 rounded-lg flex items-center justify-center text-[10px] font-black border-2 transition-all ${item.answer === c ? 'bg-amber-500 border-amber-500 text-white' : 'bg-white border-stone-100 text-stone-300'}`}>{c}</button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <textarea value={newTask} onChange={e => setNewTask(e.target.value)} rows="3" className="w-full p-4 rounded-2xl border border-stone-200 h-24 font-bold resize-none" placeholder="輸入文字任務..." />
                                    )}
                                    <button type="submit" disabled={isSubmitting} className="w-full py-4 bg-stone-900 text-white font-black rounded-2xl shadow-xl active:scale-95 disabled:opacity-50">確認佈局</button>
                                </form>
                            </div>
                        </div>

                        {/* 右側列表區 */}
                        <div className="lg:col-span-8">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                                <h2 className="text-xl font-black flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-white border border-stone-800"></div> 實戰對局區域</h2>
                                <div className="flex bg-stone-200/50 p-1 rounded-2xl overflow-x-auto max-w-full custom-scroll">
                                    {['active', 'future', 'history'].map(v => (
                                        <button key={v} onClick={() => setViewMode(v)} className={`px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap transition-all ${viewMode === v ? 'bg-stone-900 text-white shadow' : 'text-stone-500'}`}>
                                            {v === 'active' ? `待挑戰 (${counts.active})` : v === 'future' ? `預讀計畫 (${counts.future})` : `戰績榜 (${counts.history})`}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-2 mb-6">
                                {["全部", ...SUBJECTS].map(s => (
                                    <button key={s} onClick={() => setSelectedSubject(s)} className={`px-4 py-2 rounded-xl text-[10px] font-black border transition-all ${selectedSubject === s ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-stone-200 text-stone-500'}`}>{s}</button>
                                ))}
                            </div>

                            <div className="space-y-4">
                                {isLoading ? <div className="py-20 text-center font-black text-stone-400 animate-pulse">正在下載棋譜...</div> : listToDisplay.length > 0 ? (
                                    <div className="bg-white rounded-3xl border border-stone-100 shadow-lg overflow-hidden divide-y divide-stone-50">
                                        {listToDisplay.map((task, idx) => (
                                            <div key={task.id} className="p-4 sm:p-6 flex flex-col sm:flex-row sm:items-center gap-4 hover:bg-stone-50/50 transition-colors">
                                                <div className="flex items-center gap-3 min-w-[140px]">
                                                    <span className={`px-3 py-1 rounded-lg text-[10px] font-black text-white ${subStyles[task.category || '其他']}`}>{task.category}</span>
                                                    <span className="text-[10px] font-bold text-stone-400">{task.date}</span>
                                                </div>
                                                <div className="flex-1 flex items-center gap-4">
                                                    {task.type === 'photo' ? (
                                                        <div className="w-20 h-14 rounded-xl overflow-hidden border border-stone-200 flex-shrink-0 cursor-zoom-in" onClick={() => setActiveExamTask(task)}>
                                                            <LazyImage src={task.imageUrl} className="w-full h-full" />
                                                        </div>
                                                    ) : (
                                                        <div className="w-8 h-8 rounded-full border-2 border-stone-100 flex items-center justify-center flex-shrink-0 text-stone-200">
                                                            {task.completed ? <Icon name="check" size={14} className="text-green-500" /> : <Icon name="circle" size={14} />}
                                                        </div>
                                                    )}
                                                    <div className={`text-sm font-black ${task.completed ? 'line-through text-stone-400' : 'text-stone-800'}`}>
                                                        {task.type === 'photo' ? '視覺考題挑戰' : task.content}
                                                    </div>
                                                </div>
                                                <div className="flex items-center justify-end gap-2">
                                                    {task.type === 'photo' && !task.completed && (
                                                        <div className="flex gap-1">
                                                            {["A","B","C","D"].map(c => (
                                                                <button key={c} onClick={() => submitAnswer(task, c)} className="w-8 h-8 rounded-lg bg-white border border-stone-200 text-[10px] font-black hover:bg-stone-900 hover:text-white transition-all">{c}</button>
                                                            ))}
                                                        </div>
                                                    )}
                                                    <button onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', task.id))} className="p-2 text-stone-300 hover:text-red-500 transition-colors"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="py-20 text-center border-4 border-dashed border-stone-200 rounded-3xl font-black text-stone-300 italic">目前沒有相關挑戰</div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* 作答放大畫面 */}
                    {activeExamTask && (
                        <div className="fixed inset-0 z-[8000] bg-black/95 flex flex-col animate-in slide-in-from-bottom">
                            <div className="flex-1 relative p-4 flex items-center justify-center">
                                <img src={activeExamTask.imageUrl} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl shadow-white/5" />
                                <button onClick={() => setActiveExamTask(null)} className="absolute top-6 right-6 bg-white/10 text-white p-2 rounded-full"><Icon name="x" size={24} /></button>
                            </div>
                            <div className="p-8 bg-stone-900 border-t border-white/10">
                                <div className="grid grid-cols-4 gap-4 max-w-xl mx-auto">
                                    {["A","B","C","D"].map(c => (
                                        <button key={c} onClick={() => submitAnswer(activeExamTask, c)} className="aspect-video bg-stone-800 text-white font-black text-2xl rounded-2xl border border-white/10 active:scale-95 hover:bg-amber-500 hover:text-black transition-all">{c}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {aiMessage && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full shadow-2xl font-black text-white animate-bounce flex items-center gap-3 z-[9999] ${aiMessage.status === 'correct' ? 'bg-green-500' : 'bg-red-500'}`}>
                            <Icon name={aiMessage.status === 'correct' ? 'check-circle' : 'alert-circle'} />
                            {aiMessage.text}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
