<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>透鏡成像原理互動模擬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            touch-action: manipulation;
            overscroll-behavior: none;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            background-color: white;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="w-full max-w-5xl flex flex-col h-screen p-2 md:p-6 gap-3">
        <!-- 頂部標題與狀態 -->
        <header class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-lg md:text-2xl font-bold text-slate-800">透鏡成像實驗室</h1>
                <p class="text-[10px] md:text-xs text-slate-500">拖動藍色箭頭移動物體，虛線表示光線延長線</p>
            </div>
            <div id="image-type-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">
                載入中...
            </div>
        </header>

        <!-- 畫布主區 -->
        <div class="relative flex-1 bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            <canvas id="opticsCanvas" class="w-full h-full"></canvas>
            
            <!-- 即時數值顯示 -->
            <div class="absolute bottom-4 right-4 glass-panel p-3 rounded-xl shadow-lg pointer-events-none text-[10px] md:text-sm">
                <div class="grid grid-cols-2 gap-x-4">
                    <span class="text-slate-500">物距 (p):</span> <span id="val-p" class="font-mono font-bold text-blue-600">--</span>
                    <span class="text-slate-500">像距 (q):</span> <span id="val-q" class="font-mono font-bold text-red-600">--</span>
                    <span class="text-slate-500">放大率:</span> <span id="val-m" class="font-mono font-bold">--</span>
                </div>
            </div>

            <!-- 操作引導 -->
            <div class="absolute top-4 left-4 pointer-events-none opacity-50 hidden md:block">
                <div class="flex items-center gap-2 text-xs text-slate-400">
                    <div class="w-4 h-4 border-2 border-blue-500 rounded-full animate-ping"></div>
                    拖動物體
                </div>
            </div>
        </div>

        <!-- 控制台 -->
        <div class="bg-white p-4 md:p-6 rounded-3xl shadow-lg border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 類型切換 -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-400 uppercase">透鏡類型</label>
                    <div class="flex bg-slate-100 p-1 rounded-2xl">
                        <button id="btnConvex" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all">凸透鏡</button>
                        <button id="btnConcave" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all">凹透鏡</button>
                    </div>
                </div>

                <!-- 焦距控制 -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-400 uppercase">焦距調節 (f)</label>
                        <span id="f-label" class="text-xs font-mono text-blue-600 font-bold">120px</span>
                    </div>
                    <input type="range" id="focalSlider" min="50" max="200" value="120" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    <div class="flex justify-between text-[10px] text-slate-400">
                        <span>短焦距</span>
                        <span>長焦距</span>
                    </div>
                </div>

                <!-- 選項切換 -->
                <div class="flex items-center justify-around md:justify-end gap-6">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="showRays" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        <span class="ml-3 text-sm font-medium text-slate-600">顯示光路</span>
                    </label>
                    <button id="resetPos" class="p-2 rounded-full hover:bg-slate-100 transition" title="重置位置">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        const fSlider = document.getElementById('focalSlider');
        const fLabel = document.getElementById('f-label');
        const btnConvex = document.getElementById('btnConvex');
        const btnConcave = document.getElementById('btnConcave');
        const showRaysCheck = document.getElementById('showRays');
        const resetBtn = document.getElementById('resetPos');
        const badge = document.getElementById('image-type-badge');

        const displayP = document.getElementById('val-p');
        const displayQ = document.getElementById('val-q');
        const displayM = document.getElementById('val-m');

        let isConvex = true;
        let focalLength = 120;
        let objX = -240;
        let objH = 80;
        let isDragging = false;

        function init() {
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // 交互事件
            canvas.addEventListener('mousedown', (e) => startDrag(e.offsetX, e.offsetY));
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = canvas.getBoundingClientRect();
                    drag(e.clientX - rect.left);
                }
            });
            window.addEventListener('mouseup', stopDrag);

            canvas.addEventListener('touchstart', (e) => {
                const rect = canvas.getBoundingClientRect();
                const t = e.touches[0];
                startDrag(t.clientX - rect.left, t.clientY - rect.top);
                e.preventDefault();
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const rect = canvas.getBoundingClientRect();
                    drag(e.touches[0].clientX - rect.left);
                }
                e.preventDefault();
            }, { passive: false });
            canvas.addEventListener('touchend', stopDrag);

            fSlider.addEventListener('input', (e) => {
                focalLength = parseInt(e.target.value);
                fLabel.innerText = focalLength + "px";
                draw();
            });

            btnConvex.addEventListener('click', () => { isConvex = true; updateUI(); draw(); });
            btnConcave.addEventListener('click', () => { isConvex = false; updateUI(); draw(); });
            showRaysCheck.addEventListener('change', draw);
            resetBtn.addEventListener('click', () => { objX = -240; draw(); });

            updateUI();
            draw();
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            draw();
        }

        function updateUI() {
            const active = "bg-blue-600 text-white shadow-lg";
            const inactive = "text-slate-500 hover:bg-slate-200";
            btnConvex.className = `flex-1 py-2 text-sm font-bold rounded-xl transition-all ${isConvex ? active : inactive}`;
            btnConcave.className = `flex-1 py-2 text-sm font-bold rounded-xl transition-all ${!isConvex ? active : inactive}`;
        }

        function startDrag(x, y) {
            const cx = canvas.width / 2;
            if (Math.abs((x - cx) - objX) < 50) isDragging = true;
        }

        function drag(x) {
            if (!isDragging) return;
            let newX = x - canvas.width / 2;
            if (newX > -10) newX = -10;
            if (newX < -canvas.width / 2 + 20) newX = -canvas.width / 2 + 20;
            objX = newX;
            draw();
        }

        function stopDrag() { isDragging = false; }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. 主軸
            ctx.beginPath();
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 4;
            ctx.moveTo(0, cy);
            ctx.lineTo(canvas.width, cy);
            ctx.stroke();

            // 2. 刻度與焦點
            const f = isConvex ? focalLength : -focalLength;
            [focalLength, -focalLength, 2*focalLength, -2*focalLength].forEach(pos => {
                ctx.beginPath();
                ctx.arc(cx + pos, cy, 4, 0, Math.PI*2);
                ctx.fillStyle = '#cbd5e1';
                ctx.fill();
                ctx.fillStyle = '#94a3b8';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                const label = Math.abs(pos) === focalLength ? 'F' : '2F';
                ctx.fillText(label, cx + pos, cy + 20);
            });

            // 3. 成像計算
            const p = Math.abs(objX);
            const q = (f * p) / (p - f);
            const m = -q / p;
            const imgX = q;
            const imgH = objH * m;

            // 4. 繪製光線 (只保留兩條經典光線)
            if (showRaysCheck.checked) {
                drawSimplifiedRays(ctx, cx, cy, objX, objH, imgX, imgH, f);
            }

            // 5. 繪製透鏡
            drawLens(ctx, cx, cy, isConvex);

            // 6. 繪製物體 (藍)
            drawArrow(ctx, cx + objX, cy, objH, '#2563eb', '物體');

            // 7. 繪製成像 (紅)
            const isVirtual = q < 0;
            if (Math.abs(p - focalLength) > 1) { // 避開焦點處不成像的極限
                ctx.save();
                if (isVirtual) ctx.setLineDash([6, 4]);
                drawArrow(ctx, cx + imgX, cy, imgH, isVirtual ? '#fb7185' : '#dc2626', isVirtual ? '虛像' : '實像');
                ctx.restore();
            }

            updateData(p, q, m, isConvex);
        }

        function drawLens(ctx, x, y, isConvex) {
            ctx.beginPath();
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 3;
            const h = 140;
            if (isConvex) {
                ctx.moveTo(x, y - h);
                ctx.quadraticCurveTo(x + 30, y, x, y + h);
                ctx.quadraticCurveTo(x - 30, y, x, y - h);
            } else {
                ctx.moveTo(x - 20, y - h);
                ctx.lineTo(x + 20, y - h);
                ctx.quadraticCurveTo(x, y, x + 20, y + h);
                ctx.lineTo(x - 20, y + h);
                ctx.quadraticCurveTo(x, y, x - 20, y - h);
            }
            ctx.fillStyle = 'rgba(219, 234, 254, 0.5)';
            ctx.fill();
            ctx.stroke();
        }

        function drawArrow(ctx, x, y, h, color, label) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - h);
            const head = 14;
            const dir = h > 0 ? 1 : -1;
            ctx.moveTo(x - 10, y - h + head * dir);
            ctx.lineTo(x, y - h);
            ctx.lineTo(x + 10, y - h + head * dir);
            ctx.stroke();

            ctx.fillStyle = color;
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, x, y - h - (h > 0 ? 20 : -35));
        }

        function drawSimplifiedRays(ctx, cx, cy, oX, oH, iX, iH, f) {
            const startX = cx + oX;
            const startY = cy - oH;
            const isVirtual = iX < 0;

            // --- 光線 1：平行軸 -> 經過焦點 ---
            ctx.beginPath();
            ctx.strokeStyle = '#10b981'; // 綠色
            ctx.lineWidth = 1.5;
            ctx.moveTo(startX, startY);
            ctx.lineTo(cx, startY); 
            
            if (isConvex) {
                const slope = (cy - startY) / (f);
                ctx.lineTo(cx + canvas.width, startY + slope * canvas.width);
                ctx.stroke();
                if (isVirtual) {
                    ctx.save();
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(cx, startY);
                    ctx.lineTo(cx + iX, cy - iH);
                    ctx.stroke();
                    ctx.restore();
                }
            } else {
                const slope = (startY - cy) / (focalLength);
                ctx.lineTo(cx + canvas.width, startY + slope * canvas.width);
                ctx.stroke();
                ctx.save();
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(cx, startY);
                ctx.lineTo(cx + iX, cy - iH);
                ctx.stroke();
                ctx.restore();
            }

            // --- 光線 2：經過鏡心 ---
            ctx.beginPath();
            ctx.strokeStyle = '#f59e0b'; // 橘色
            ctx.moveTo(startX, startY);
            const slope2 = (cy - startY) / (-oX);
            ctx.lineTo(cx + (iX > 0 ? canvas.width : iX - 100), cy + slope2 * (iX > 0 ? canvas.width : iX - 100));
            ctx.stroke();
            if (isVirtual) {
                ctx.save();
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(cx + iX, cy - iH);
                ctx.stroke();
                ctx.restore();
            }
        }

        function updateData(p, q, m, isConvex) {
            displayP.innerText = p.toFixed(0) + "px";
            displayQ.innerText = Math.abs(q).toFixed(0) + "px" + (q < 0 ? " (虛)" : " (實)");
            displayM.innerText = Math.abs(m).toFixed(2) + "x";

            let desc = "";
            let colorClass = "";
            if (isConvex) {
                if (p > 2*focalLength) { desc = "縮小、倒立、實像"; colorClass = "bg-green-100 text-green-700"; }
                else if (p === 2*focalLength) { desc = "等大、倒立、實像"; colorClass = "bg-green-100 text-green-700"; }
                else if (p > focalLength) { desc = "放大、倒立、實像"; colorClass = "bg-green-100 text-green-700"; }
                else if (Math.abs(p - focalLength) < 2) { desc = "不成像 (無窮遠)"; colorClass = "bg-slate-100 text-slate-700"; }
                else { desc = "放大、正立、虛像"; colorClass = "bg-rose-100 text-rose-700"; }
            } else {
                desc = "縮小、正立、虛像"; colorClass = "bg-rose-100 text-rose-700";
            }
            badge.innerText = desc;
            badge.className = `px-3 py-1 rounded-full text-xs font-bold ${colorClass}`;
        }

        window.onload = init;
    </script>
</body>
</html>
